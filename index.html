<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>For Sev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --c-night: #0a0f1c;       /* deep midnight navy */
  --c-dusk: #131c2e;         /* slightly lighter navy */
  --c-mulberry: #1c2640;     /* navy with subtle warmth */
  --c-rose-dp: #4a3a52;      /* muted dusty plum (not pink) */
  --c-rose: #6b4f5e;         /* muted rose */
  --c-coral: #b8845a;        /* warm gold-tan */
  --c-peach: #d4a87e;        /* light gold */
  --c-gold: #e8c285;         /* bright antique gold */
  --c-cream: #f0e8d0;        /* warm cream */
  --ink: #1a1f2e;
  --warm-white: #e8e0c8;
  --stem: #6e7d54;
  --dawn: 0;
}
@property --dawn { syntax: '<number>'; inherits: true; initial-value: 0; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 300;
  background: var(--c-night);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ============ STAGE SYSTEM ============ */
.stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  opacity: 0; visibility: hidden;
  transition: opacity 2.2s cubic-bezier(0.22, 1, 0.36, 1), visibility 0s linear 2.2s;
  overflow: hidden;
}
.stage.active { opacity: 1; visibility: visible; transition: opacity 2.2s cubic-bezier(0.22, 1, 0.36, 1), visibility 0s; }

/* ============ STAGE 1: DAWN (the coax) ============ */
#stage-1 { background: linear-gradient(180deg, #050810 0%, #0a0f1c 30%, #131c2e 60%, #1c2640 85%, #2a2a3a 100%); }
#stage-1 .warm-layer {
  position: absolute; inset: 0;
  opacity: var(--dawn);
  background:
    radial-gradient(55% 30% at 50% 50%, rgba(255, 240, 200, 0.95) 0%, transparent 65%),
    radial-gradient(100% 60% at 50% 60%, rgba(232, 194, 133, 0.55) 0%, transparent 75%),
    linear-gradient(180deg, rgba(28, 38, 64, 0) 0%, rgba(184, 132, 90, 0.4) 50%, rgba(232, 194, 133, 0.7) 90%, rgba(240, 232, 208, 0.9) 100%);
}
#stage-1 .stars { position: absolute; inset: 0; opacity: calc(1 - var(--dawn)); }
#stage-1 .star { position: absolute; border-radius: 50%; background: var(--warm-white); box-shadow: 0 0 3px rgba(232, 224, 200, 0.6); }
#stage-1 .constellation { position: absolute; inset: 0; opacity: calc((1 - var(--dawn)) * 0.6); }
#stage-1 .constellation svg { position: absolute; inset: 0; width: 100%; height: 100%; }
#stage-1 .constellation .pt { fill: var(--warm-white); }
#stage-1 .constellation .ln { stroke: var(--warm-white); stroke-width: 0.4; fill: none; opacity: 0.3; }
#stage-1 .sun {
  position: absolute; left: 50%; top: 50%;
  width: 360px; height: 360px; margin-left: -180px; margin-top: -180px;
  border-radius: 50%; z-index: 3;
  background: radial-gradient(circle, rgba(255, 245, 210, 1) 0%, rgba(232, 194, 133, 0.85) 30%, rgba(184, 132, 90, 0.4) 60%, transparent 85%);
  filter: blur(2px);
  transform: translateY(calc(50vh * (1 - var(--dawn))));
  opacity: calc(0.15 + 0.85 * var(--dawn));
  box-shadow: 0 0 80px rgba(232, 194, 133, 0.6), 0 0 160px rgba(232, 194, 133, 0.3);
}
#stage-1 .constellation .pt.eye {
  fill: var(--c-gold);
  filter: drop-shadow(0 0 4px rgba(232, 194, 133, 0.9)) drop-shadow(0 0 10px rgba(232, 194, 133, 0.5));
  animation: eyePulse 2.6s ease-in-out infinite;
}
@keyframes eyePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
#stage-1 .invitation {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; max-width: min(36ch, 88vw);
  opacity: 0; filter: blur(14px);
  pointer-events: none;
  z-index: 5;
}
#stage-1 .invitation.show { animation: invIn 2.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#stage-1 .invitation.fade { animation: invOut 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes invIn {
  0% { opacity: 0; filter: blur(14px); transform: translate(-50%, -45%); }
  100% { opacity: 1; filter: blur(0); transform: translate(-50%, -50%); }
}
@keyframes invOut {
  0% { opacity: 1; filter: blur(0); transform: translate(-50%, -50%); }
  100% { opacity: 0; filter: blur(8px); transform: translate(-50%, -55%); }
}
#stage-1 .invitation .line {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: clamp(1rem, 2.2vw, 1.25rem);
  line-height: 1.7; color: var(--warm-white);
  text-shadow: 0 0 30px rgba(5, 8, 16, 0.9), 0 0 60px rgba(5, 8, 16, 0.5);
  display: block;
  opacity: 0; filter: blur(12px);
}
#stage-1 .invitation .line.show { animation: lineIn 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
@keyframes lineIn {
  0% { opacity: 0; filter: blur(12px); transform: translateY(8px); }
  100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}
#stage-1 .invitation .line.emphasis {
  font-weight: 400; font-style: normal;
  color: var(--c-gold);
  text-shadow: 0 0 40px rgba(247,212,155,0.5);
  margin-top: 0.6em; font-size: clamp(1.1rem, 2.5vw, 1.4rem);
}
#stage-1 .invitation .line.instruction {
  font-size: clamp(1rem, 2.2vw, 1.25rem);
  color: var(--c-gold);
  margin-top: 1.8em;
  opacity: 1;
  letter-spacing: 0.04em;
  font-weight: 300;
  text-shadow: 0 0 24px rgba(247, 212, 155, 0.7), 0 0 50px rgba(247, 212, 155, 0.35);
}
#stage-1 .invitation .line.instruction.show {
  animation: lineIn 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards, holdPulse 2.2s ease-in-out 1.6s infinite;
}
@keyframes holdPulse {
  0%, 100% { opacity: 1; transform: translateY(0) scale(1); }
  50% { opacity: 0.75; transform: translateY(2px) scale(1.015); }
}
#stage-1 .invitation .deco {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--c-gold), transparent);
  margin: 1.2em auto 0.8em;
  opacity: 0;
}
#stage-1 .invitation .deco.show { animation: decoIn 1.4s ease 0.8s forwards; }
@keyframes decoIn { 0% { opacity: 0; width: 0; } 100% { opacity: 0.5; width: 40px; } }
#stage-1 .name-s1 {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: clamp(5rem, 16vw, 11rem);
  letter-spacing: -0.02em; color: var(--warm-white);
  white-space: nowrap; pointer-events: none;
  filter: blur(calc(20px * var(--dawn)));
  opacity: calc(1 - var(--dawn) * 0.8);
  animation: nameBlurIn 2.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
}
@keyframes nameBlurIn { 0% { opacity: 0; filter: blur(16px); transform: translate(-50%, -50%); } 100% { opacity: 1; filter: blur(0); transform: translate(-50%, -50%); } }
.prompt-s1 {
  position: absolute; bottom: 15%; left: 50%;
  transform: translateX(-50%);
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  color: var(--warm-white); white-space: nowrap;
  opacity: 0; filter: blur(14px);
  text-shadow: 0 0 30px rgba(36,16,36,0.7);
}
.prompt-s1.show { animation: blurIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.prompt-s1.fade { animation: blurOut 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

/* ============ STAGE 2: GARDEN (plant roses) ============ */
#stage-2 {
  background: linear-gradient(180deg, #2a2540 0%, #3d2a3e 30%, #4a3a52 60%, #5a4254 100%);
}
#stage-2 .garden-light {
  position: absolute; inset: 0;
  background: radial-gradient(80% 50% at 50% 30%, rgba(255,240,200,0.4) 0%, transparent 60%);
}
#stage-2 .stage-prompt {
  position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: var(--ink); white-space: nowrap;
  opacity: 0; filter: blur(12px);
  text-shadow: 0 0 20px rgba(255,255,255,0.5);
}
#stage-2 .stage-prompt.show { animation: blurIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#stage-2 .stage-prompt.fade { animation: blurOut 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
#stage-2 .garden-ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
  background: linear-gradient(180deg, transparent 0%, rgba(110, 80, 60, 0.15) 40%, rgba(110, 80, 60, 0.3) 100%);
}
#stage-2 .rose-row {
  position: absolute; bottom: 18%; left: 0; right: 0;
  display: flex; justify-content: center; align-items: flex-end;
  gap: clamp(40px, 8vw, 120px);
  padding: 0 10%;
}
#stage-2 .rose-slot {
  position: relative; width: 100px; height: 200px;
  cursor: pointer; display: flex; align-items: flex-end; justify-content: center;
}
#stage-2 .rose-slot svg { width: 100%; height: 100%; }

#stage-2 .planted-flower {
  position: absolute;
  bottom: 0;
  width: 100px; height: 200px;
  pointer-events: none;
  transform: translateX(-50%);
  z-index: 5;
  animation: flowerGrow 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
#stage-2 .planted-flower svg { width: 100%; height: 100%; display: block; }
@keyframes flowerGrow {
  0% { opacity: 0; transform: translateX(-50%) scale(0.3) translateY(30px); }
  60% { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(-5px); }
  100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
}

/* ============ STAGE 3: AUTUMN (catch leaves) ============ */
#stage-3 {
  background: linear-gradient(180deg, #1a1f2e 0%, #3d2a3e 30%, #5a3a2a 70%, #4a2a1a 100%);
}
#stage-3 .stage-prompt {
  position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: var(--warm-white); white-space: nowrap;
  opacity: 0; filter: blur(12px);
  text-shadow: 0 0 20px rgba(0,0,0,0.3);
}
#stage-3 .stage-prompt.show { animation: blurIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#stage-3 .stage-prompt.fade { animation: blurOut 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
#stage-3 .leaf {
  position: absolute; width: 64px; height: 64px; cursor: pointer; z-index: 5;
  animation: leafFall linear forwards;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)) drop-shadow(0 0 12px rgba(232, 194, 133, 0.3));
}
#stage-3 .leaf::after {
  content: ''; position: absolute; inset: -8px; border-radius: 50%;
}
#stage-3 .leaf.caught { animation: leafCatch 0.6s ease forwards; pointer-events: none; }
#stage-3 .leaf-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'Fraunces', serif; font-style: italic; font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: var(--warm-white); text-align: center; max-width: 500px;
  padding: 0 2rem; opacity: 0; pointer-events: none;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
#stage-3 .leaf-msg.show { animation: msgShow 3.5s ease forwards; }

/* ============ STAGE 4: MONACO (light the harbor) ============ */
#stage-4 {
  background: linear-gradient(180deg, #1a1f2e 0%, #3d2a3e 30%, #6b4f3a 70%, #4a3a52 100%);
}
#stage-4 .stage-prompt {
  position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 300;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: var(--warm-white); white-space: nowrap;
  opacity: 0; filter: blur(12px);
  text-shadow: 0 0 20px rgba(0,0,0,0.4);
}
#stage-4 .stage-prompt.show { animation: blurIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#stage-4 .stage-prompt.fade { animation: blurOut 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
#stage-4 .harbor { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 700px; }
#stage-4 .harbor svg { width: 100%; height: auto; }
#stage-4 .light-target {
  fill: transparent; cursor: pointer; transition: fill 1.2s ease;
}
#stage-4 .light-target.lit { fill: rgba(255, 220, 140, 0.85); }
#stage-4 .light-target.lit::before { content: ''; }

/* ============ STAGE 5: REVEAL (typewriter message) ============ */
#stage-5 {
  background: linear-gradient(180deg, #1a1f2e 0%, #232a3a 30%, #2d3548 60%, #3a4258 100%);
}
#stage-5 .sun-high {
  position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
  width: 140px; height: 140px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,245,210,0.5) 0%, rgba(232,194,133,0.25) 50%, transparent 80%);
  filter: blur(6px);
  box-shadow: 0 0 80px rgba(232,194,133,0.3);
}
#stage-5 .message-wrap {
  position: relative; z-index: 5; max-width: min(42ch, 90vw);
  text-align: left; padding: 2rem;
}
#stage-5 .message-p {
  font-family: 'Inter', sans-serif; font-weight: 300;
  font-size: clamp(0.95rem, 1.8vw, 1.05rem);
  line-height: 1.8; color: var(--warm-white);
  margin-bottom: 1.4rem;
  min-height: 1.8em;
  text-shadow: 0 0 20px rgba(5, 8, 16, 0.6);
}
#stage-5 .message-p.typing { color: var(--warm-white); }
#stage-5 .cursor {
  display: inline-block; width: 1px; height: 1em;
  background: var(--c-gold); margin-left: 2px;
  animation: blink 0.8s steps(2) infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
#stage-5 .continue-hint {
  position: relative; margin-top: 2rem;
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 0.9rem; color: var(--c-gold);
  opacity: 0; transition: opacity 0.6s ease;
  text-align: center; cursor: pointer;
  text-shadow: 0 0 16px rgba(232, 194, 133, 0.5);
}
#stage-5 .continue-hint.show { opacity: 0.85; }
#stage-5 .continue-hint.show:hover { opacity: 1; }
#stage-5 .signature {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: clamp(1.3rem, 2.5vw, 1.6rem);
  color: var(--c-gold);
  margin-top: 3rem; text-align: center;
  opacity: 0; filter: blur(8px);
  transition: filter 1.2s ease, opacity 1.2s ease 0.3s;
  text-shadow: 0 0 24px rgba(232, 194, 133, 0.5);
}
#stage-5 .signature.show { opacity: 1; filter: blur(0); }

/* ============ HEART CANVAS ============ */
#stage-5 .hearts-canvas {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 2.5s ease 0.5s;
}
#stage-5 .hearts-canvas.show { opacity: 1; }

/* ============ KEYFRAMES ============ */
@keyframes blurIn {
  0% { opacity: 0; filter: blur(14px); transform: translateX(-50%) translateY(18px); }
  100% { opacity: 1; filter: blur(0); transform: translateX(-50%) translateY(0); }
}
@keyframes blurOut {
  0% { opacity: 1; filter: blur(0); transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; filter: blur(10px); transform: translateX(-50%) translateY(-10px); }
}
@keyframes leafFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  4% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes leafCatch {
  0% { transform: scale(1) rotate(0); opacity: 1; }
  100% { transform: scale(2.5) translateY(-30px) rotate(180deg); opacity: 0; }
}
@keyframes msgShow {
  0% { opacity: 0; transform: translate(-50%, -45%); }
  15% { opacity: 1; transform: translate(-50%, -50%); }
  85% { opacity: 1; transform: translate(-50%, -50%); }
  100% { opacity: 0; transform: translate(-50%, -55%); }
}

.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
:focus-visible { outline: 2px solid var(--c-gold); outline-offset: 4px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.5s !important; }
}
</style>
</head>
<body>

<!-- STAGE 1: DAWN — hold to coax the sun up -->
<div class="stage active" id="stage-1">
  <div class="warm-layer"></div>
  <div class="stars" id="stars-s1"></div>
  <div class="constellation" id="constellation-s1"></div>
  <div class="sun"></div>
  <div class="invitation" id="invitation">
    <span class="line" id="inv-1">Hello there, weary traveler,</span>
    <span class="line deco" id="inv-deco"></span>
    <span class="line" id="inv-2">you have completed this chapter.</span>
    <span class="line emphasis" id="inv-3">Adventure awaits.</span>
    <span class="line instruction" id="inv-4">click and hold.</span>
  </div>
  <p class="prompt-s1" id="prompt-s1">begin.</p>
</div>

<!-- STAGE 2: GARDEN -- click anywhere to grow 5 flowers -->
<div class="stage" id="stage-2">
  <div class="garden-light"></div>
  <p class="stage-prompt" id="prompt-s2">tap to grow.</p>
  <div class="garden-ground"></div>
  <div class="flower-field" id="flower-field"></div>
</div>

<!-- STAGE 3: AUTUMN — catch falling leaves -->
<div class="stage" id="stage-3">
  <p class="stage-prompt" id="prompt-s3">catch what falls.</p>
  <div class="leaf-msg" id="leaf-msg"></div>
</div>

<!-- STAGE 4: MONACO — light the harbor -->
<div class="stage" id="stage-4">
  <p class="stage-prompt" id="prompt-s4">light the way.</p>
  <div class="harbor" id="harbor"></div>
</div>

<!-- STAGE 5: REVEAL — typewriter message, click to continue -->
<div class="stage" id="stage-5">
  <div class="sun-high"></div>
  <canvas class="hearts-canvas" id="hearts-canvas"></canvas>
  <div class="message-wrap" id="message-wrap"></div>
  <div class="continue-hint" id="continue-hint">continue</div>
  <p class="signature" id="signature">— with love, Umar</p>
</div>

<div id="announcer" aria-live="polite" class="sr-only"></div>

<script>
(function() {
  'use strict';

  // ============ STAGE MANAGER ============
  let currentStage = 0;
  const stages = ['stage-1', 'stage-2', 'stage-3', 'stage-4', 'stage-5'];
  const prompts = {
    0: { show: null, fade: 'prompt-s1', next: 'prompt-s2' },
    1: { show: 'prompt-s2', fade: null, next: 'prompt-s3' },
    2: { show: 'prompt-s3', fade: null, next: 'prompt-s4' },
    3: { show: 'prompt-s4', fade: null, next: null }
  };
  let stageInitialised = [false, false, false, false, false];

  function goToStage(idx) {
    if (idx === currentStage) return;
    const prev = document.getElementById(stages[currentStage]);
    const next = document.getElementById(stages[idx]);
    if (prev) prev.classList.remove('active');
    if (next) next.classList.add('active');
    document.getElementById('announcer').textContent = 'Stage ' + (idx + 1);
    currentStage = idx;
    if (!stageInitialised[idx]) {
      stageInitialised[idx] = true;
      if (idx === 0) initStage1();
      if (idx === 1) initStage2();
      if (idx === 2) initStage3();
      if (idx === 3) initStage4();
      if (idx === 4) initStage5();
    }
  }

  function showPrompt(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('fade');
    el.classList.add('show');
  }
  function fadePrompt(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('show');
    el.classList.add('fade');
  }

  // ============ STAGE 1: DAWN — hold to raise --dawn ============
  let dawn = 0;
  let isHolding = false;
  let holdStart = 0;
  let holdFromDawn = 0;
  let s1Done = false;
  const root = document.documentElement;

  function setDawn(v) {
    dawn = Math.max(0, Math.min(1, v));
    root.style.setProperty('--dawn', dawn);
  }

  function initStage1() {
    // Stars
    const container = document.getElementById('stars-s1');
    for (let i = 0; i < 100; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = (Math.random() * 55) + '%';
      const size = 0.6 + Math.random() * 1.6;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.opacity = 0.25 + Math.random() * 0.7;
      container.appendChild(s);
    }
    // Jaguar constellation (side view, walking left)
    const c = document.getElementById('constellation-s1');
    const pts = [
      // Head (left side, front of body)
      { x: 10, y: 38 }, // 0: nose
      { x: 14, y: 24 }, // 1: ear front
      { x: 19, y: 23 }, // 2: ear back
      { x: 23, y: 28 }, // 3: forehead
      { x: 30, y: 34 }, // 4: back of head / neck

  // Heart particles rising from below, meeting at the top of the sun
  function startDawnHearts() {
    const canvas = document.createElement('canvas');
    canvas.id = 'dawn-hearts';
    canvas.style.cssText = 'position:absolute;inset:0;z-index:4;pointer-events:none;';
    const stage1 = document.getElementById('stage-1');
    stage1.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    let w, h;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const heartColors = ['#e8c285', '#d4a87e', '#b8845a', '#f0e8d0', '#c8a868', '#ff4d77'];
    const particles = [];
    const sunX = w / 2;
    const sunTopY = h / 2 - 180; // top edge of the 360px sun glow at full dawn
    const targetY = sunTopY - 30; // hearts meet just above the sun

    function drawHeart(ctx, x, y, size) {
      const s = size / 16;
      ctx.beginPath();
      for (let t = 0; t < Math.PI * 2; t += 0.1) {
        const hx = 16 * Math.pow(Math.sin(t), 3);
        const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        if (t === 0) ctx.moveTo(x + hx * s, y + hy * s);
        else ctx.lineTo(x + hx * s, y + hy * s);
      }
      ctx.closePath();
    }

    let startTime = performance.now();
    let lastSpawn = 0;
    const spawnInterval = 70;

    function animate(now) {
      const elapsed = (now - startTime) / 1000;
      if (elapsed > 4.5) { canvas.remove(); return; }
      ctx.clearRect(0, 0, w, h);

      // Spawn a fresh heart every spawnInterval (until 3.5s)
      if (now - lastSpawn > spawnInterval && elapsed < 3.5) {
        lastSpawn = now;
        particles.push({
          startX: sunX + (Math.random() - 0.5) * 320,
          startY: h + 30,
          size: 4 + Math.random() * 5,
          color: heartColors[Math.floor(Math.random() * heartColors.length)],
          duration: 2.0 + Math.random() * 1.2,
          start: elapsed,
          wobbleAmp: 10 + Math.random() * 18,
          wobbleFreq: 1.5 + Math.random() * 1.5,
          wobblePhase: Math.random() * Math.PI * 2
        });
      }

      const fadeAlpha = elapsed < 3.4 ? 1 : Math.max(0, 1 - (elapsed - 3.4) / 1.1);

      particles.forEach(p => {
        const pElapsed = elapsed - p.start;
        if (pElapsed < 0) return;
        const prog = Math.min(1, pElapsed / p.duration);
        // ease-out cubic: starts fast, slows toward target
        const eased = 1 - Math.pow(1 - prog, 3);

        // x converges from startX toward sunX as it rises
        const x = p.startX + (sunX - p.startX) * eased;
        const y = p.startY + (targetY - p.startY) * eased;
        // gentle horizontal wobble that fades as heart reaches target
        const wobbleX = Math.sin(pElapsed * p.wobbleFreq + p.wobblePhase) * p.wobbleAmp * (1 - eased);

        // alpha: fade in over first 8%, hold, fade out over last 20%
        let alpha = 0.7;
        if (prog < 0.08) alpha *= prog / 0.08;
        if (prog > 0.8) alpha *= (1 - prog) / 0.2;
        alpha *= fadeAlpha;

        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 14;
        ctx.shadowColor = p.color;
        drawHeart(ctx, x + wobbleX, y, p.size);
        ctx.fill();
      });

      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  }

  function s2StartGrowing(x) {
    if (s2Done || s2ActiveFlower) return;

      if (!s2ActiveFlower || s2ActiveFlower !== flower) return;
      const elapsed = performance.now() - s2GrowthStart;
      const progress = Math.min(1, elapsed / s2GrowthDuration);
      const eased = 1 - Math.pow(1 - progress, 2.5);

      flower.style.opacity = Math.min(1, progress * 4);

    const elapsed = performance.now() - s2GrowthStart;

  // ============ AUDIO: bassline fade-in ============
  function startBassline() {
    if (grooveStarted) return;
    grooveStarted = true;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const bpm = 112;
    const beat = 60 / bpm;
    const bars = 12;
    const master = ctx.createGain();
    master.gain.value = 0;
    master.gain.linearRampToValueAtTime(0.16, ctx.currentTime + 4);
    master.connect(ctx.destination);
    const bassPattern = [
      { n: 65.41, t: 0 }, { n: 65.41, t: beat * 0.5 },
      { n: 49.00, t: beat * 1 }, { n: 65.41, t: beat * 1.5 },
      { n: 77.78, t: beat * 2 }, { n: 65.41, t: beat * 2.5 },
      { n: 49.00, t: beat * 3 }, { n: 58.27, t: beat * 3.5 }
    ];
    const now = ctx.currentTime + 0.3;
    for (let bar = 0; bar < bars; bar++) {
      const start = now + bar * beat * 4;
      bassPattern.forEach(bp => {
        const t = start + bp.t;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.value = bp.n;
        const f = ctx.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.value = 600; f.Q.value = 8;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.15, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + beat * 0.4);
        osc.connect(f); f.connect(g); g.connect(master);
        osc.start(t); osc.stop(t + beat * 0.5);
      });
      for (let h = 0; h < 8; h++) {
        const t = start + h * beat * 0.5 + beat * 0.25;
        const noise = ctx.createBufferSource();
        const buf = ctx.createBuffer(1, 2048, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < 2048; i++) d[i] = Math.random() * 2 - 1;
        noise.buffer = buf;
        const hpf = ctx.createBiquadFilter();
        hpf.type = 'highpass'; hpf.frequency.value = 8000;
        const hgain = ctx.createGain();
        hgain.gain.setValueAtTime(0.025, t);
        hgain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        noise.connect(hpf); hpf.connect(hgain); hgain.connect(master);
        noise.start(t); noise.stop(t + 0.05);
      }
      [0, 2].forEach(bn => {
        const t = start + bn * beat;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
        g.gain.setValueAtTime(0.18, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.connect(g); g.connect(master);
        osc.start(t); osc.stop(t + 0.15);
      });
    }
  }

  // ============ INPUT ============
  // Stage 1: hold to raise dawn
  document.addEventListener('mousedown', function() {
    if (currentStage === 0) s1HoldStart();
    if (currentStage === 4) s5Advance();
  });
  document.addEventListener('mouseup', function() {
    if (currentStage === 0) s1HoldEnd();
  });
  document.addEventListener('touchstart', function(e) {
    if (currentStage === 0) s1HoldStart();
    if (currentStage === 4) s5Advance();
  }, { passive: true });
  document.addEventListener('touchend', function() {
    if (currentStage === 0) s1HoldEnd();
  });
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (currentStage === 0) s1HoldStart();
      if (currentStage === 4) s5Advance();
    }
  });
  document.addEventListener('keyup', function(e) {
    if (e.code === 'Space' || e.code === 'Enter') {
      if (currentStage === 0) s1HoldEnd();
    }
  });

  // ============ HEART PARTICLES (Stage 5 ambient) ============
  function startHearts() {
    const canvas = document.getElementById('hearts-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const stage = document.getElementById('stage-5');

    function resize() {
      canvas.width = stage.offsetWidth;
      canvas.height = stage.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    const colors = ['#e8c285', '#d4a87e', '#b8845a', '#f0e8d0', '#c8a868'];
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const numSamples = 90;
    const scale = Math.min(canvas.width, canvas.height) * 0.02;

    for (let i = 0; i < numSamples; i++) {
      const t = (i / numSamples) * Math.PI * 2;
      let bx = cx + scale * 16 * Math.pow(Math.sin(t), 3);
      let by = cy - scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      bx += (Math.random() - 0.5) * scale * 4;
      by += (Math.random() - 0.5) * scale * 4;

      particles.push({
        baseX: bx, baseY: by,
        startX: cx + (Math.random() - 0.5) * 60,
        startY: cy + (Math.random() - 0.5) * 60,
        size: 1.5 + Math.random() * 2.2,
        color: colors[Math.floor(Math.random() * colors.length)],
        duration: 2.2 + Math.random() * 2.4,
        delay: i * 0.018,
        phaseOff: Math.random() * Math.PI * 2
      });
    }

    let time = 0;
    let cycle = 0;
    canvas.classList.add('show');

    function animate() {
      if (currentStage !== 4) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 0.016;

      particles.forEach(function(p) {
        let prog = Math.max(0, (time - p.delay) / p.duration);
        if (prog > 1) prog = 1;
        let eased = prog < 0.5 ? Math.pow(2 * prog, 3) : 1 - Math.pow(-2 * prog + 2, 3) / 2;
        if (cycle === 1) eased = 1 - eased;

        const tx = p.startX + (p.baseX - p.startX) * eased;
        const ty = p.startY + (p.baseY - p.startY) * eased;
        const fx = Math.sin(time * 0.4 + p.phaseOff) * 4;
        const fy = Math.cos(time * 0.3 + p.phaseOff) * 4;

        ctx.globalAlpha = 0.35 + 0.35 * prog;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(tx + fx, ty + fy, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;

      var cycleDur = 0;
      particles.forEach(function(p) { var d = p.delay + p.duration; if (d > cycleDur) cycleDur = d; });
      cycleDur += 2;
      if (time > cycleDur) { time = 0; cycle = 1 - cycle; }

      requestAnimationFrame(animate);
    }

    animate();
  }

  // ============ INIT ============
  // Stage 1 is the initial stage — init it
  stageInitialised[0] = true;
  initStage1();
})();
</script>
</body>
</html>
